name: Publish Quarto site

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up Python (pour les blocs de code Python dans Quarto)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Render Quarto site
        run: quarto render training/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: training/_site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
