name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_container_tests:
        description: "Run Apptainer container tests (requires self-hosted runner with Apptainer)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-python:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest -v --tb=short

  test-bash:
    name: bats
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        uses: bats-core/bats-action@2.0.0

      - name: Run bats tests
        run: bats training/tests/bats/

  test-r:
    name: testthat
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      - name: Install testthat
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: testthat

      - name: Run R tests
        run: Rscript -e "testthat::test_dir('training/tests/testthat/')"

  test-nextflow:
    name: nf-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v3
        with:
          version: latest-stable

      - name: Install nf-test
        run: |
          bash <(curl -fsSL https://get.nf-test.com)
          sudo mv nf-test /usr/local/bin/
          which nf-test

      - name: Run nf-test
        run: |
          cd training/tests/nf-test
          nf-test test --verbose

  test-containers:
    name: container tests (Apptainer)
    # Only runs when manually triggered with run_container_tests=true.
    # Requires a self-hosted runner that has Apptainer installed.
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_container_tests == 'true' }}
    runs-on: [self-hosted, apptainer]
    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        uses: bats-core/bats-action@2.0.0

      - name: Pull FastQC SIF image
        working-directory: training/exercises/05_testing_containers/containers
        run: |
          apptainer pull fastqc_0.12.1.sif \
            docker://biocontainers/fastqc:0.12.1--hdfd78af_0

      - name: Run container bats tests
        run: bats training/exercises/05_testing_containers/tests/container_fastqc.bats
